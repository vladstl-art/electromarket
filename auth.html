<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — ЭнергоМаркет</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; font-family: sans-serif; }
        .auth-form input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .auth-btn:hover { background: #004494; }
        .toggle-link { margin-top: 15px; display: block; color: #0056b3; cursor: pointer; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body style="background: #f4f4f4;">

    <div class="auth-container">
        <h2 id="auth-title">Вход в ЭнергоМаркет</h2>
        <form class="auth-form" id="authForm">
            <input type="text" id="username" placeholder="Имя пользователя" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit" class="auth-btn" id="submitBtn">Войти</button>
        </form>
        <span class="toggle-link" id="toggleAuth">Нет аккаунта? Зарегистрироваться</span>
    </div>

    <script>
        // АВТОМАТИЧЕСКИЙ ВЫБОР АДРЕСА СЕРВЕРА
        const API_URL = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
            ? "http://127.0.0.1:10000" 
            : "https://energomarket-e1k3.onrender.com";

        const authForm = document.getElementById('authForm');
        const toggleLink = document.getElementById('toggleAuth');
        const authTitle = document.getElementById('auth-title');
        const submitBtn = document.getElementById('submitBtn');
        let isLogin = true;

        toggleLink.onclick = () => {
            isLogin = !isLogin;
            authTitle.innerText = isLogin ? "Вход в ЭнергоМаркет" : "Регистрация";
            submitBtn.innerText = isLogin ? "Войти" : "Создать аккаунт";
            toggleLink.innerText = isLogin ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
        };

        authForm.onsubmit = async (e) => {
            e.preventDefault();
            
            const usernameValue = document.getElementById('username').value;
            const passwordValue = document.getElementById('password').value;

            const endpoint = isLogin ? '/login' : '/register';
            
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameValue, password: passwordValue })
                });

                const result = await response.json();

                if (response.ok) {
                    if (isLogin) {
                        localStorage.setItem('currentUser', usernameValue);
                        alert('Добро пожаловать, ' + usernameValue + '!');
                        window.location.href = 'profile.html';
                    } else {
                        alert('Регистрация прошла успешно! Теперь войдите.');
                        isLogin = true;
                        toggleLink.click();
                    }
                } else {
                    alert('Ошибка: ' + result.error);
                }
            } catch (error) {
                alert('Не удалось связаться с сервером по адресу: ' + API_URL);
            }
        };
    </script>
</body>
</html>
