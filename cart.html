<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корзина — EnergoMarket</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-container { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; font-family: sans-serif; }
        .cart-main { flex: 3; background: white; padding: 20px; border-radius: 8px; }
        .cart-sidebar { flex: 1; background: #f9f9f9; padding: 20px; border-radius: 8px; height: fit-content; border: 1px solid #ddd; }
        .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-item img { width: 80px; height: 80px; object-fit: contain; }
        .checkout-btn { background: #78be20; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .remove-btn { color: #ff4d4d; cursor: pointer; font-size: 1.2rem; background: none; border: none; }
    </style>
</head>
<body style="background: #f4f4f4;">
    <header style="background: #0056b3; padding: 10px; color: white;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">← Вернуться в магазин</a>
            <h2>Ваша корзина</h2>
        </div>
    </header>

    <div class="cart-container">
        <div class="cart-main">
            <h3>Товары в заказе</h3>
            <div id="cart-items-list">
                <!-- Сюда JavaScript вставит товары -->
            </div>
        </div>

        <div class="cart-sidebar">
            <h3>Резюме</h3>
            <div style="display: flex; justify-content: space-between; margin: 10px 0;">
                <span>Товаров:</span>
                <span id="total-items">0</span>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin-top: 20px;">
                <span>Итого:</span>
                <span id="total-price">0 ₽</span>
            </div>
            <button class="checkout-btn">ОФОРМИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <script>
        function renderCart() {
            const cartItems = JSON.parse(localStorage.getItem('energoCart')) || [];
            const list = document.getElementById('cart-items-list');
            const totalItemsElem = document.getElementById('total-items');
            const totalPriceElem = document.getElementById('total-price');

            if (cartItems.length === 0) {
                list.innerHTML = "<h4>Корзина пуста</h4>";
                return;
            }

            let totalSum = 0;
            list.innerHTML = cartItems.map((item, index) => {
                totalSum += item.price;
                return `
                    <div class="cart-item">
                        <img src="${item.img}" alt="">
                        <div style="flex: 2; margin-left: 20px;">
                            <strong>${item.name}</strong>
                            <p style="color: #666; font-size: 0.8rem;">Код: ${item.id}</p>
                        </div>
                        <div style="flex: 1; text-align: center; font-weight: bold;">${item.price} ₽</div>
                        <button class="remove-btn" onclick="removeFromCart(${index})">×</button>
                    </div>
                `;
            }).join('');

            totalItemsElem.innerText = cartItems.length;
            totalPriceElem.innerText = totalSum + " ₽";
        }

        window.removeFromCart = function(index) {
            let cartItems = JSON.parse(localStorage.getItem('energoCart')) || [];
            cartItems.splice(index, 1);
            localStorage.setItem('energoCart', JSON.stringify(cartItems));
            renderCart();
        }

        renderCart();
    </script>
</body>
</html>
